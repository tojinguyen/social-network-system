global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'post-service'
    static_configs:
      - targets: ['post-service:8082']

  - job_name: 'feed-service'
    static_configs:
      - targets: ['feed-service:8083']

  - job_name: 'chat-service'
    static_configs:
      - targets: ['chat-service:8084']

  - job_name: 'fanout-worker'
    static_configs:
      - targets: ['fanout-worker:8085']

  - job_name: 'chatengine-worker'
    static_configs:
      - targets: ['chatengine-worker:8086']
