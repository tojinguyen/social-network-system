version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: social-network-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongo_data:/data/db
    networks:
      - social-network-net

  redis:
    image: redis:7.0-alpine
    container_name: social-network-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - social-network-net

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: social-network-auth-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017/social_network?authSource=admin
      - MONGO_DB_NAME=social_network
      - REDIS_URI=redis:6379
      - REDIS_PASSWORD=
      - JWT_SECRET=super_secret_access_token_key_123456
      - JWT_REFRESH_SECRET=super_secret_refresh_token_key_654321
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4317
      - OTEL_METRICS_ENABLED=true
    depends_on:
      - mongodb
      - redis
      - tempo
    networks:
      - social-network-net

  post-service:
    build:
      context: .
      dockerfile: services/post/Dockerfile
    container_name: social-network-post-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017/social_network?authSource=admin
      - MONGO_DB_NAME=social_network
      - REDIS_URI=redis:6379
      - REDIS_PASSWORD=
      - JWT_SECRET=super_secret_access_token_key_123456
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_POST_CREATED=post-created
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4317
      - OTEL_METRICS_ENABLED=true
    depends_on:
      - mongodb
      - redis
      - kafka
      - tempo
    networks:
      - social-network-net

  feed-service:
    build:
      context: .
      dockerfile: services/feed/Dockerfile
    container_name: social-network-feed-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017/social_network?authSource=admin
      - MONGO_DB_NAME=social_network
      - REDIS_URI=redis:6379
      - REDIS_PASSWORD=
      - JWT_SECRET=super_secret_access_token_key_123456
      - CELEBRITY_THRESHOLD=10000
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4317
      - OTEL_METRICS_ENABLED=true
    depends_on:
      - mongodb
      - redis
      - tempo
    networks:
      - social-network-net

  fanout-worker:
    build:
      context: .
      dockerfile: services/fanout/Dockerfile
    container_name: social-network-fanout-worker
    restart: always
    ports:
      - "8085:8085"
    environment:
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017/social_network?authSource=admin
      - MONGO_DB_NAME=social_network
      - REDIS_URI=redis:6379
      - REDIS_PASSWORD=
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_POST_CREATED=post-created
      - CELEBRITY_THRESHOLD=10000
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4317
      - OTEL_METRICS_ENABLED=true
    depends_on:
      - mongodb
      - redis
      - kafka
      - tempo
    networks:
      - social-network-net

  chat-service:
    build:
      context: .
      dockerfile: services/chat/Dockerfile
    container_name: social-network-chat-service
    restart: always
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017/social_network?authSource=admin
      - MONGO_DB_NAME=social_network
      - REDIS_URI=redis:6379
      - REDIS_PASSWORD=
      - JWT_SECRET=super_secret_access_token_key_123456
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_CHAT_INCOMING=chat-incoming
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4317
      - OTEL_METRICS_ENABLED=true
    depends_on:
      - mongodb
      - redis
      - kafka
      - tempo
    networks:
      - social-network-net

  chatengine-worker:
    build:
      context: .
      dockerfile: services/chatengine/Dockerfile
    container_name: social-network-chatengine-worker
    restart: always
    ports:
      - "8086:8086"
    environment:
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017/social_network?authSource=admin
      - MONGO_DB_NAME=social_network
      - REDIS_URI=redis:6379
      - REDIS_PASSWORD=
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_CHAT_INCOMING=chat-incoming
      - CONSUMER_GROUP_ID=chat-engine-group
      - WORKER_POOL_SIZE=50
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4317
      - OTEL_METRICS_ENABLED=true
    depends_on:
      - mongodb
      - redis
      - kafka
      - tempo
    networks:
      - social-network-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: social-network-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Q
    networks:
      - social-network-net

  tempo:
    image: grafana/tempo:latest
    container_name: social-network-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - social-network-net

  prometheus:
    image: prom/prometheus:latest
    container_name: social-network-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - social-network-net

  grafana:
    image: grafana/grafana:latest
    container_name: social-network-grafana
    restart: always
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
    networks:
      - social-network-net

networks:
  social-network-net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

