server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
    pipeline_stages:
      - json:
          expressions:
            stream: stream
            attrs: attrs
            tag: tag
            log: log
      # Extract fields from the application log line
      - json:
          source: log
          expressions:
            level: level
            service: service
            msg: msg
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          service:
